services:
  # Frontend Static Site
  - type: web
    name: buildwithmushfiq-frontend
    env: static
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: buildwithmushfiq-backend
          type: web
          property: host

  # Backend Web Service
  - type: web
    name: buildwithmushfiq-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npx tsx server/index.ts
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NODE_ENV
        value: production
